---
- name: Verify - GitLab HTTP is running
  hosts: all
  become: false
  vars:
    ansible_python_interpreter: auto_silent
  tasks:
    - name: Include default vars
      ansible.builtin.include_vars:
        dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/defaults/"
        extensions: ["yml"]

    # include_vars loads role defaults (e.g. gitlab__port_web_http 9081); converge uses 8080.
    # Published ports bind on the Docker daemon host (runner). The Molecule instance is another
    # container; probe from the runner via delegate_to: localhost (host.docker.internal is unreliable in CI).
    # Must match molecule/default/converge.yml (external_url uses hostname + client port).
    - name: Set Molecule verify HTTP target (Host header required for GitLab nginx vhost)
      ansible.builtin.set_fact:
        gitlab_molecule_http_port: 8080
        gitlab_molecule_hostname: gitlab.local

    - name: Check if GitLab container is running
      community.docker.docker_container_info:
        name: "{{ gitlab__name }}"
      register: gitlab_container
      retries: 60
      delay: 10
      until: gitlab_container.exists and gitlab_container.container.State.Running
      failed_when: false
      # Max wait: 10 minutes (60 × 10s), but completes as soon as container is running

    - name: Wait for GitLab mapped port on host to become reachable
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ gitlab_molecule_http_port }}"
        timeout: 600
        delay: 10
      delegate_to: localhost
      connection: local
      # Max wait: 10 minutes, but completes as soon as port is open

    - name: Wait for GitLab to respond (basic connectivity)
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ gitlab_molecule_http_port }}/"
        status_code: [200, 302, 401, 403]
        return_content: false
        headers:
          Host: "{{ gitlab_molecule_hostname }}:{{ gitlab_molecule_http_port }}"
      register: web_check_basic
      retries: 60
      delay: 10
      until: web_check_basic.status in [200, 302, 401, 403]
      failed_when: false
      delegate_to: localhost
      connection: local
      # Max wait: 10 minutes (60 × 10s), but completes as soon as GitLab responds

    - name: Wait until GitLab healthcheck returns 200 OK
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ gitlab_molecule_http_port }}/-/health"
        return_content: true
        status_code: [200]
        headers:
          Host: "{{ gitlab_molecule_hostname }}:{{ gitlab_molecule_http_port }}"
      register: web_check
      retries: 50
      delay: 15
      until: web_check.status == 200
      failed_when: web_check is failed or web_check.status != 200
      delegate_to: localhost
      connection: local
      # Max wait: 12.5 minutes (50 × 15s), but completes as soon as healthcheck passes
      # Typical: 6-7 minutes on powerful machines, 8-10 minutes on CI

    - name: Debug response content
      ansible.builtin.debug:
        var: web_check.content
