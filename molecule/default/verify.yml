---
# community.docker for container_info and exec (exec runs where docker.sock is available: instance).
- name: Verify - GitLab HTTP is running
  hosts: all
  become: false
  collections:
    - community.docker
  vars:
    ansible_python_interpreter: auto_silent
  tasks:
    - name: Include default vars
      ansible.builtin.include_vars:
        dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/defaults/"
        extensions: ["yml"]

    # include_vars loads role defaults (e.g. gitlab__port_web_http 9081); converge uses 8080.
    # Published ports bind on the Docker daemon host (runner). The Molecule instance is another
    # container; probe from the runner via delegate_to: localhost (host.docker.internal is unreliable in CI).
    # Port for wait_for on runner (published bind). Hostname for nginx vhost inside GitLab (converge).
    - name: Set Molecule verify facts (match molecule/default/converge.yml)
      ansible.builtin.set_fact:
        gitlab_molecule_http_port: 8080
        gitlab_molecule_hostname: gitlab.local

    - name: Check if GitLab container is running
      community.docker.docker_container_info:
        name: "{{ gitlab__name }}"
      register: gitlab_container
      retries: 60
      delay: 10
      until: gitlab_container.exists and gitlab_container.container.State.Running
      failed_when: false
      # Max wait: 10 minutes (60 × 10s), but completes as soon as container is running

    - name: Wait for GitLab mapped port on host to become reachable
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ gitlab_molecule_http_port }}"
        timeout: 600
        delay: 10
      delegate_to: localhost
      connection: local
      # Max wait: 10 minutes, but completes as soon as port is open

    # Do not use ansible.builtin.uri from the runner: GitLab redirects/canonical URLs use
    # gitlab.local, which is not resolvable on GHA, and urllib may still hit DNS (-3) on some stacks.

    # Monitoring URLs (/-/health, /-/readiness) are IP-allowlisted to loopback inside GitLab.
    # Traffic from the runner via published ports appears as the Docker bridge IP, so HTTP probes
    # from localhost get 404; curl from inside the container uses 127.0.0.1 and matches the allowlist.
    - name: Wait until GitLab readiness returns OK (exec inside container)
      community.docker.docker_container_exec:
        container: "{{ gitlab__name }}"
        env:
          PATH: "/opt/gitlab/embedded/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        argv:
          - curl
          - -sfS
          - -o
          - /dev/null
          - -H
          - "Host: {{ gitlab_molecule_hostname }}"
          - "http://127.0.0.1/-/readiness"
      register: gitlab_readiness_exec
      retries: 50
      delay: 15
      until: gitlab_readiness_exec.rc == 0
      failed_when: gitlab_readiness_exec.rc != 0
      # Max wait: 12.5 minutes (50 × 15s), but completes as soon as readiness passes
      # Typical: 6-7 minutes on powerful machines, 8-10 minutes on CI

    - name: Debug readiness probe result
      ansible.builtin.debug:
        var: gitlab_readiness_exec
